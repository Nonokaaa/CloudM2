name: Front Build and push to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'src/front/**'
      - '.github/workflows/front-build-push.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: cloud-m2_front

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker Build
        uses: docker/build-push-action@v6
        with:
          context: ./src/front
          push: true
          # C'est ici qu'on insère l'URL de l'API stockée dans les secrets GitHub
          build-args: |
            VITE_API_URL=${{ secrets.AZURE_API_URL }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_FRONT }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONT }}
